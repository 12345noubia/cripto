services:
  - type: web
    name: cryptolearn
    env: node
    runtime: node
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: "NODE_ENV"
        value: "production"
      - key: "PORT"
        value: "3000"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
